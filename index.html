<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lilater - Professional Streamer Interface</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

        :root {
            --bg: #030712;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --panel: rgba(17, 24, 39, 0.7);
        }

        body { 
            background: var(--bg);
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 70px;
        }

        /* Localhost Arka Plan Animasyonu (OBS'de görünmez) */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 120%, #1e1b4b 0%, var(--bg) 70%);
            z-index: -1;
        }

        /* Kurulum Ekranı */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .setup-card {
            background: var(--panel); backdrop-filter: blur(30px); padding: 50px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            width: 400px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Altyazı Konteynırı */
        #caption-area { width: 90%; text-align: center; max-width: 1200px; }

        /* Orijinal Metin (Üstte, Modern Kayıt Efektiyle) */
        #orig-wrapper {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.05); padding: 8px 20px;
            border-radius: 100px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .rec-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #orig { font-size: 16px; color: #94a3b8; font-weight: 500; letter-spacing: 0.5px; }

        /* Ana Çeviri Kutusu */
        #trans-box {
            position: relative;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.9) 0%, rgba(17, 24, 39, 0.95) 100%);
            padding: 35px 60px;
            border-radius: 35px;
            display: inline-block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        #trans-box::after {
            content: ""; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
            width: 40%; height: 4px; background: var(--accent); border-radius: 10px;
            box-shadow: 0 0 15px var(--accent);
        }

        #trans {
            font-size: 48px; font-weight: 800; color: white;
            line-height: 1.1; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        /* Modern Butonlar ve Selectler */
        select {
            width: 100%; padding: 15px; border-radius: 15px; margin: 10px 0;
            background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); outline: none;
            font-family: inherit; cursor: pointer;
        }
        .start-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--accent); color: white; font-weight: 800; font-size: 18px;
            cursor: pointer; margin-top: 25px; transition: 0.3s;
        }
        .start-btn:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h1 style="color:var(--accent); font-size: 42px; font-weight: 800; margin:0; letter-spacing: -1px;">Lilater</h1>
            <p style="color:#94a3b8; font-size: 14px; margin-bottom: 30px;">Professional Streamer Tools</p>
            
            <div style="text-align:left; font-size:12px; font-weight:700; color:#64748b; margin-bottom:5px; text-transform:uppercase;">Input Language</div>
            <select id="sL"><option value="tr-TR">Turkish</option><option value="en-US">English</option></select>
            
            <div style="text-align:left; font-size:12px; font-weight:700; color:#64748b; margin-bottom:5px; text-transform:uppercase; margin-top:15px;">Target Language</div>
            <select id="tL"><option value="İngilizce">English</option><option value="Türkçe">Turkish</option></select>
            
            <button onclick="launch()" class="start-btn">LAUNCH INTERFACE</button>
        </div>
    </div>

    <div id="caption-area" class="hidden">
        <div id="orig-wrapper">
            <div class="rec-dot"></div>
            <div id="orig">Voice capturing...</div>
        </div>
        <br>
        <div id="trans-box">
            <p id="trans">Waiting for speech...</p>
        </div>
    </div>

    <script>
        const socket = io();
        let recognition;
        let lastSent = "";

        function launch() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('caption-area').classList.remove('hidden');
            init(document.getElementById('sL').value, document.getElementById('tL').value);
        }

        function init(src, target) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = src;
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let full = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    full += e.results[i][0].transcript;
                }

                // Senin o çok sevdiğin "yığılmayı önleyen" akıllı kesme mantığı
                const words = full.trim().split(/\s+/);
                const focusText = words.slice(-12).join(" "); 
                
                document.getElementById('orig').innerText = focusText;

                if (focusText.length > 5 && focusText !== lastSent) {
                    socket.emit('translate-this', { text: focusText, target: target });
                    lastSent = focusText;
                }
            };

            recognition.onresult = (e) => {
                let full = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    full += e.results[i][0].transcript;
                }
                const words = full.trim().split(/\s+/);
                const focusText = words.slice(-12).join(" ");
                document.getElementById('orig').innerText = focusText;

                // Sessizlik kontrolü için küçük timer
                clearTimeout(window.sTimer);
                window.sTimer = setTimeout(() => {
                    if (focusText !== lastSent) {
                        socket.emit('translate-this', { text: focusText, target: target });
                        lastSent = focusText;
                    }
                }, 500);
            };

            recognition.onend = () => { try { recognition.start(); } catch(e){} };
            recognition.start();
        }

        socket.on('display-translation', (t) => {
            const trans = document.getElementById('trans');
            trans.innerText = t;
        });
    </script>
</body>
</html>
