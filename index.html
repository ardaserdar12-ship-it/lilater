<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilater | AI Real-time Translation</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --primary: #6366f1;
            --primary-soft: rgba(99, 102, 241, 0.1);
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .section { display: none; min-height: 100vh; width: 100%; transition: opacity 0.5s ease; position: relative; }
        .section.active { display: flex; flex-direction: column; animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- LANDING --- */
        #home-page { align-items: center; justify-content: flex-start; padding: 0 20px; }
        .nav-landing { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 30px 0; z-index: 100; }
        
        .hero { text-align: center; margin-top: 120px; position: relative; z-index: 10; width: 100%; }
        .hero-title { font-size: 5rem; font-weight: 800; letter-spacing: -3px; line-height: 1.1; margin-bottom: 20px; }
        .gradient-text { background: linear-gradient(180deg, #fff 50%, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* --- ESTETİK BAYRAK YERLEŞİMİ --- */
        .flag-bg { 
            position: absolute; 
            font-size: 1.5rem; 
            opacity: 0.15; 
            filter: grayscale(0.5);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes float { 
            0%, 100% { transform: translateY(0) rotate(0); } 
            50% { transform: translateY(-30px) rotate(10deg); } 
        }

        /* UI Elemanları */
        .hero-desc { color: var(--text-dim); font-size: 1.2rem; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6; }
        .btn { padding: 16px 32px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        .btn-outline { background: transparent; color: white; border: 1px solid var(--border); }
        
        /* --- WORKSPACE --- */
        .main-trans-card { width: 90%; max-width: 1000px; background: rgba(10,12,20,0.9); padding: 50px; border-radius: 30px; border: 1px solid var(--border); text-align: center; margin-top: 50px; }
        #trans-text { font-size: 2.8rem; font-weight: 800; color: #fff; line-height: 1.2; }
        #orig-box { color: var(--text-dim); margin-bottom: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <section id="home-page" class="section active">
        <div class="flag-bg" style="top:15%; left:10%;">🇹🇷</div>
        <div class="flag-bg" style="top:20%; right:12%; animation-delay: 1s;">🇺🇸</div>
        <div class="flag-bg" style="bottom:25%; left:15%; animation-delay: 2s;">🇩🇪</div>
        <div class="flag-bg" style="bottom:20%; right:10%; animation-delay: 3s;">🇯🇵</div>
        <div class="flag-bg" style="top:40%; left:5%; animation-delay: 4s;">🇫🇷</div>
        <div class="flag-bg" style="top:60%; right:5%; animation-delay: 5s;">🇬🇧</div>

        <nav class="nav-landing">
            <div style="font-weight: 800; font-size: 1.8rem;">Lilater<span style="color: var(--primary);">.</span></div>
            <button class="btn btn-outline" style="padding: 10px 20px;" onclick="showSection('setup-page')">Giriş Yap</button>
        </nav>

        <div class="hero">
            <div style="background: var(--primary-soft); color: var(--primary); padding: 8px 16px; border-radius: 100px; display: inline-block; font-size: 0.8rem; font-weight: 700; margin-bottom: 20px;">AI REAL-TIME TRANSLATION</div>
            <h1 class="hero-title gradient-text">Dili Engel Olmaktan <br> Çıkarın.</h1>
            <p class="hero-desc">Yapay zeka ile canlı yayınlarınızda dili bariyer olmaktan çıkarın, küresel kitleye anında ulaşın.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-primary" onclick="showSection('setup-page')">Ücretsiz Deneyin</button>
                <button class="btn btn-outline" onclick="alert('Onboarding Yakında!')">Tanıtımı İzle</button>
            </div>
        </div>
    </section>

    <section id="setup-page" class="section" style="justify-content:center; align-items:center;">
        <div style="background: rgba(15,20,30,0.8); padding: 50px; border-radius: 35px; border: 1px solid var(--border); width: 450px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Ayarlar</h2>
            <select id="sL" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; border:1px solid var(--border); margin-bottom: 10px;">
                <option value="tr-TR">Türkçe</option>
                <option value="en-US">İngilizce</option>
            </select>
            <select id="tL" style="width:100%; padding:15px; background:#000; color:#fff; border-radius:10px; border:1px solid var(--border); margin-bottom: 20px;">
                <option value="İngilizce">İngilizce'ye Çevir</option>
                <option value="Almanca">Almanca'ya Çevir</option>
                <option value="Fransızca">Fransızca'ya Çevir</option>
            </select>
            <button class="btn btn-primary" style="width: 100%;" onclick="startEngine()">Başlat</button>
        </div>
    </section>

    <section id="work-page" class="section">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: 800;">Lilater.</div>
            <button class="btn btn-outline" style="padding: 8px 16px;" onclick="location.reload()">Çıkış</button>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div id="orig-box">Dinleniyor...</div>
            <div class="main-trans-card"><div id="trans-text">...</div></div>
        </div>
    </section>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let recognition;
        let lastTranscript = "";

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function startEngine() {
            showSection('work-page');
            const src = document.getElementById('sL').value;
            const target = document.getElementById('tL').value;
            
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new Speech();
                recognition.lang = src;
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onresult = (e) => {
                    let currentTranscript = "";
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        currentTranscript += e.results[i][0].transcript;
                    }
                    
                    document.getElementById('orig-box').innerText = currentTranscript;

                    // ZEKA BURADA: Eğer cümle yeterince uzunsa veya duraklama varsa gönder
                    clearTimeout(window.sTimer);
                    window.sTimer = setTimeout(() => {
                        if (currentTranscript.length > 5 && currentTranscript !== lastTranscript) {
                            socket.emit('translate-this', { text: currentTranscript, target: target });
                            lastTranscript = currentTranscript;
                        }
                    }, 800); // 800ms duraklama bekler, kelime kelime çevirip kafayı yemez.
                };

                recognition.onend = () => { try { recognition.start(); } catch(e) {} };
                recognition.start();
            } catch(e) { alert("Mikrofon izni gerekli!"); }
        }

        socket.on('display-translation', (t) => {
            document.getElementById('trans-text').innerText = t;
        });
    </script>
</body>
</html>
